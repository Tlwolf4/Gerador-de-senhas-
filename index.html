<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>gerador de senhas</title>
<link rel="stylesheet" href="./src/css/style.css">
</head>
<body>

<div class="box">
    <h2>gerador de senhas</h2>

    <input type="text" id="senha" readonly>

    <p>tamanho: <span id="valor">8</span></p>
    <input type="range" id="tamanho" min="4" max="16" value="8">

    <button onclick="gerar()">gerar senha</button>
</div>

<script src="./src/js/script.js"></script>
</body>
</html>
